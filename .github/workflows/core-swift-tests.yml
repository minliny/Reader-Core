name: Reader Core Swift Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/core-swift-tests.yml"
      - "Core/**"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/core-swift-tests.yml"
      - "Core/**"

jobs:
  core-swift-tests:
    name: Swift test (Core)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Swift
        run: swift --version

      - name: Run ReaderCoreParser tests
        working-directory: Core
        shell: bash
        run: |
          set -o pipefail
          swift test --verbose 2>&1 | tee swift-test.log

      - name: Generate test snapshot and update reports
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          # clean-room: no external dependencies; uses only Python stdlib.
          # Purpose: parse XCTest log → write swift_test_snapshot.json (artifact only,
          # never committed automatically) and update regression report YAMLs in the
          # CI workspace (execution state only; does NOT write to compat_matrix).
          # compat_matrix actualLevel is maintained manually via human review of
          # artifacts; CI never mutates it.
          import re, json, datetime, pathlib, sys

          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          log_path = pathlib.Path("Core/swift-test.log")
          if not log_path.exists():
              print("::warning::swift-test.log not found, skipping snapshot generation")
              sys.exit(0)

          lines = log_path.read_text(encoding="utf-8", errors="replace").splitlines()

          # Map XCTest class.method → sample ID
          TEST_SAMPLE_MAP = {
              "JSRuntimeTests.testExecuteReturnsOriginalHTMLWhenExecutionTimesOut": "sample_js_runtime_001",
              "JSRuntimeUnsupportedBoundaryTests.testExecuteReturnsOriginalHTMLWhenQuerySelectorIsUnavailable": "sample_js_runtime_002",
              "NonJSSample004RegressionTests.testSearchParsesThreeItemsFromFixture": "nonjs_sample_004_search",
              "NonJSSample004RegressionTests.testTOCParsesFourChaptersFromFixture": "nonjs_sample_004_toc",
              "NonJSSample004RegressionTests.testContentParsesExpectedTextFromFixture": "nonjs_sample_004_content",
              "NonJSSample005RegressionTests.testSearchParsesTwoItemsFromFixture": "nonjs_sample_005_search",
              "NonJSSample005RegressionTests.testTOCParsesThreeChaptersFromFixture": "nonjs_sample_005_toc",
              "NonJSSample005RegressionTests.testContentParsesExpectedTextFromFixture": "nonjs_sample_005_content",
              # V2 stable baseline: real-world parser cases (samples/real_world/parser_cases/)
              # These tests are part of the default swift test run above; entries here
              # ensure they appear in the snapshot artifact for traceability.
              "RealWorldParserCasesTests.testCase001_dotClass_multipleHits": "rw_parser_case_001_dotclass",
              "RealWorldParserCasesTests.testCase002_hashId_singleHit": "rw_parser_case_002_hashid",
              "RealWorldParserCasesTests.testCase003_tag_threeHits": "rw_parser_case_003_tag",
              "RealWorldParserCasesTests.testCase004_tagDotClass_filtersNonMatchingTag": "rw_parser_case_004_tagdotclass",
              "RealWorldParserCasesTests.testCase005_boundary_multiClassElement_matchesWhenTargetClassPresent": "rw_parser_case_005_boundary",
              "RealWorldParserCasesExtendedTests.testCase006_tagDotClass_divChapter": "rw_parser_case_006_tagdotclass",
              "RealWorldParserCasesExtendedTests.testCase007_dotClass_resultTitle_fourHits": "rw_parser_case_007_dotclass",
              "RealWorldParserCasesExtendedTests.testCase008_hashId_bookDetail": "rw_parser_case_008_hashid",
              "RealWorldParserCasesExtendedTests.testCase009_tag_h3_excludesH4": "rw_parser_case_009_tag",
              "RealWorldParserCasesExtendedTests.testCase010_tagDotClass_spanAuthor_excludesDivAuthor": "rw_parser_case_010_tagdotclass",
              "RealWorldParserCasesExtendedTests.testCase011_dotClass_catalogItem_fiveHits": "rw_parser_case_011_dotclass",
              "RealWorldParserCasesExtendedTests.testCase012_hashId_contentArea": "rw_parser_case_012_hashid",
              "RealWorldParserCasesExtendedTests.testCase013_tag_td_sixCells": "rw_parser_case_013_tag",
              "RealWorldParserCasesExtendedTests.testCase014_tagDotClass_pDesc_excludesPNote": "rw_parser_case_014_tagdotclass",
              "RealWorldParserCasesExtendedTests.testCase015_boundary_classNameWithHyphen": "rw_parser_case_015_boundary",
              "RealWorldParserCasesExtendedTests.testCase016_tagDotClass_trItem": "rw_parser_case_016_tagdotclass",
              "RealWorldParserCasesExtendedTests.testCase017_boundary_idWithHyphen": "rw_parser_case_017_boundary",
              "RealWorldParserCasesExtendedTests.testCase018_tag_h1_singleHit": "rw_parser_case_018_tag",
              "RealWorldParserCasesExtendedTests.testCase019_tagDotClass_aChapterLink": "rw_parser_case_019_tagdotclass",
              "RealWorldParserCasesExtendedTests.testCase020_boundary_singleItemResultSet": "rw_parser_case_020_boundary",
              "ParserNegativeBoundaryTests.testNegative001_tagHashId_returnsZeroMatches": "rw_parser_negative_case_001_taghashid",
              "ParserNegativeBoundaryTests.testNegative002_descendantSelector_returnsZeroMatches": "rw_parser_negative_case_002_descendant",
              "ParserNegativeBoundaryTests.testNegative003_directChildSelector_returnsZeroMatches": "rw_parser_negative_case_003_child",
              "ParserNegativeBoundaryTests.testNegative004_attributeSelector_returnsZeroMatches": "rw_parser_negative_case_004_attribute",
              "ParserNegativeBoundaryTests.testNegative005_multipleSelectorGroup_returnsZeroMatches": "rw_parser_negative_case_005_group",
              "ParserNegativeBoundaryTests.testNegative006_pseudoClass_returnsZeroMatches": "rw_parser_negative_case_006_pseudo",
              # Public API integration check (no @testable — simulates iOS SPM consumer)
              "ParserPublicAPITests.testPublicAPI_tagDotClass_returnsExpectedMatch": "parser_public_api_integration",
          }

          pattern = re.compile(
              r"Test Case '-\[(?P<module>\S+)\.(?P<cls>\S+) (?P<method>\S+)\]'"
              r" (?P<status>passed|failed) \((?P<duration>[\d.]+) seconds\)\."
          )

          results = {}
          for line in lines:
              m = pattern.search(line)
              if not m:
                  continue
              key = f"{m.group('cls')}.{m.group('method')}"
              sample_id = TEST_SAMPLE_MAP.get(key)
              if sample_id:
                  results[sample_id] = {
                      "sampleId": sample_id,
                      "testClass": m.group("cls"),
                      "testMethod": m.group("method"),
                      "status": m.group("status"),
                      "durationSeconds": float(m.group("duration")),
                  }

          # Write swift_test_snapshot.json (CI artifact; not committed to repo)
          snapshot = {
              "generatedAt": now,
              "logFile": "Core/swift-test.log",
              "testsFound": len(results),
              "tests": list(results.values()),
          }
          snap_path = pathlib.Path("samples/reports/latest/swift_test_snapshot.json")
          snap_path.parent.mkdir(parents=True, exist_ok=True)
          snap_path.write_text(json.dumps(snapshot, indent=2, ensure_ascii=False) + "\n")
          print(f"Wrote {snap_path} ({len(results)} mapped test(s))")

          # Update regression YAMLs in CI workspace: execution state only.
          # Fields updated: executorVerified, run.note, summary counts, sampleResults[].status.
          # These files are uploaded as artifacts; a human decides when to commit them.
          # compat_matrix is NOT touched here — actualLevel (A/B/C/D) is set by humans.
          REGRESSION_FILES = {
              "sample_js_runtime_001": pathlib.Path("samples/reports/latest/js_runtime_timeout_regression.yml"),
              "sample_js_runtime_002": pathlib.Path("samples/reports/latest/js_runtime_queryselector_unsupported_regression.yml"),
              "nonjs_sample_004_search":  pathlib.Path("samples/reports/latest/nonjs_sample_004_search_regression.yml"),
              "nonjs_sample_004_toc":     pathlib.Path("samples/reports/latest/nonjs_sample_004_toc_regression.yml"),
              "nonjs_sample_004_content": pathlib.Path("samples/reports/latest/nonjs_sample_004_content_regression.yml"),
              "nonjs_sample_005_search":  pathlib.Path("samples/reports/latest/nonjs_sample_005_search_regression.yml"),
              "nonjs_sample_005_toc":     pathlib.Path("samples/reports/latest/nonjs_sample_005_toc_regression.yml"),
              "nonjs_sample_005_content": pathlib.Path("samples/reports/latest/nonjs_sample_005_content_regression.yml"),
          }
          for sample_id, reg_path in REGRESSION_FILES.items():
              if not reg_path.exists():
                  print(f"::warning::{reg_path} not found")
                  continue
              text = reg_path.read_text(encoding="utf-8")
              r = results.get(sample_id)
              exec_status = r["status"] if r else "unknown"
              passed = 1 if exec_status == "passed" else 0
              failed = 1 if exec_status == "failed" else 0

              text = re.sub(r'executorVerified: false', 'executorVerified: true', text)
              text = re.sub(
                  r'note: "Swift toolchain is unavailable[^"]*"',
                  f'note: "Verified by GitHub Actions CI on macOS-14. Swift test executed {now}."',
                  text
              )
              text = re.sub(r'\bpassed: 0\b', f'passed: {passed}', text)
              text = re.sub(r'\bfailed: 0\b', f'failed: {failed}', text)
              text = re.sub(r'\bskipped: 1\b', 'skipped: 0', text)
              text = re.sub(r'status: "pending"', f'status: "{exec_status}"', text)
              reg_path.write_text(text, encoding="utf-8")
              print(f"Updated {reg_path} in CI workspace (executorVerified=true, status={exec_status})")
          PY

      - name: Emit swift test failure excerpt
        if: failure()
        working-directory: Core
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          log_path = Path("swift-test.log")
          if not log_path.exists():
              print("::error::swift-test.log not found")
              raise SystemExit(0)

          lines = log_path.read_text(encoding="utf-8", errors="replace").splitlines()
          excerpt = lines[-80:]

          print("===== swift test failure excerpt =====")
          for line in excerpt:
              print(line)

          emitted = 0
          markers = (" error: ", " failed - ", "Assertion failed", "XCTAssert", "Test Case '-[")
          for line in lines:
              if any(marker in line for marker in markers):
                  safe = line.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                  print(f"::error::{safe}")
                  emitted += 1
                  if emitted >= 20:
                      break

          if emitted == 0:
              for line in excerpt[-20:]:
                  safe = line.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                  print(f"::error::{safe}")
          PY

      - name: Upload swift test log and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-swift-test-log
          if-no-files-found: error
          path: |
            Core/swift-test.log
            samples/reports/latest/swift_test_snapshot.json
            samples/reports/latest/js_runtime_timeout_regression.yml
            samples/reports/latest/js_runtime_queryselector_unsupported_regression.yml
            samples/reports/latest/nonjs_sample_004_search_regression.yml
            samples/reports/latest/nonjs_sample_004_toc_regression.yml
            samples/reports/latest/nonjs_sample_004_content_regression.yml
            samples/reports/latest/nonjs_sample_005_search_regression.yml
            samples/reports/latest/nonjs_sample_005_toc_regression.yml
            samples/reports/latest/nonjs_sample_005_content_regression.yml
